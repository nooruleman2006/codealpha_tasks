<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow - Language Translator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Background Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <!-- Main Container -->
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fa-solid fa-earth-americas"></i>
                <h1>LinguaFlow</h1>
            </div>
            <p class="tagline">Break language barriers, connect the world</p>
        </div>

        <!-- Translator Card -->
        <div class="translator-card">

            <!-- Language Selectors Row -->
            <div class="lang-row">
                <div class="lang-select-wrapper">
                    <label>Translate From</label>
                    <select id="sourceLang">
                        <option value="en">🇬🇧 English</option>
                        <option value="ur">🇵🇰 Urdu</option>
                        <option value="ar">🇸🇦 Arabic</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="zh">🇨🇳 Chinese</option>
                        <option value="ja">🇯🇵 Japanese</option>
                        <option value="tr">🇹🇷 Turkish</option>
                        <option value="hi">🇮🇳 Hindi</option>
                    </select>
                </div>

                <!-- Swap Button -->
                <button class="swap-btn" id="swapBtn" title="Swap Languages">
                    <i class="fa-solid fa-right-left"></i>
                </button>

                <div class="lang-select-wrapper">
                    <label>Translate To</label>
                    <select id="targetLang">
                        <option value="ur">🇵🇰 Urdu</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="ar">🇸🇦 Arabic</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="zh">🇨🇳 Chinese</option>
                        <option value="ja">🇯🇵 Japanese</option>
                        <option value="tr">🇹🇷 Turkish</option>
                        <option value="hi">🇮🇳 Hindi</option>
                    </select>
                </div>
            </div>

            <!-- Text Areas Row -->
            <div class="text-row">

                <!-- Input Side -->
                <div class="text-box">
                    <div class="text-box-header">
                        <span>Source Text</span>
                        <button class="clear-btn" id="clearBtn" title="Clear">
                            <i class="fa-solid fa-xmark"></i> Clear
                        </button>
                    </div>
                    <textarea id="sourceText" placeholder="Enter text to translate..."></textarea>
                    <div class="char-count"><span id="charCount">0</span> / 500</div>
                </div>

                <!-- Output Side -->
                <div class="text-box output-box">
                    <div class="text-box-header">
                        <span>Translation</span>
                        <div class="output-actions">
                            <button class="icon-btn" id="copyBtn" title="Copy Translation">
                                <i class="fa-regular fa-copy"></i> Copy
                            </button>
                            <button class="icon-btn" id="ttsBtn" title="Listen">
                                <i class="fa-solid fa-volume-high"></i> Listen
                            </button>
                        </div>
                    </div>
                    <div id="outputText" class="output-text">
                        <span class="placeholder-text">Translation will appear here...</span>
                    </div>
                </div>

            </div>

            <!-- Translate Button -->
            <button class="translate-btn" id="translateBtn">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>Translate</span>
            </button>

            <!-- Status Message -->
            <div class="status-msg" id="statusMsg"></div>

        </div>

        <!-- Footer -->
        <p class="footer">Powered by MyMemory API &nbsp;|&nbsp; Built with ❤️ by Noor</p>

    </div>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
    <script src="script.js"></script>
</body>
</html>
